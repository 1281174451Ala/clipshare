name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: clipshare
          - os: windows-latest
            artifact: clipshare.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pyperclip Pillow
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pip install pywin32
          fi
        shell: bash

      - name: Build
        run: python -m PyInstaller --clean --noconfirm clipshare.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist

      - name: List artifacts
        run: ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos-latest/clipshare
            dist/windows-latest/clipshare.exe
          generate_release_notes: true